name: aragog

volumes:
  minio_data:
    driver: local
  qdrant_data:
    driver: local

services:

  server:
    profiles:
      - server
    build: .
    container_name: server
    restart: unless-stopped
    network_mode: host
    env_file: .env
    volumes:
      - ./data:/app/data
    depends_on:
      - minio
      - qdrant

  minio:
    image: docker.io/minio/minio:latest
    container_name: minio
    restart: unless-stopped
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    command: server /data --console-address ":9001"

  qdrant:
    image: docker.io/qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__LOG_LEVEL: INFO
      QDRANT__SERVICE__API_KEY: ${QDRANT_TOKEN}
  
  ###################
  # OPTIONAL 
  ###################

  docling:
    profiles:
    - docling
    image: quay.io/docling-project/docling-serve:latest
    container_name: docling
    restart: unless-stopped
    ports:
      - "127.0.0.1:5001:5001"
    environment:
      - DOCLING_SERVE_ENABLE_UI=True
      - DOCLING_SERVE_MAX_SYNC_WAIT=${DOCLING_TIMEOUT}

  embedder:
    profiles:
      - embedder
    image: vllm/vllm-openai:latest
    container_name: embedder
    restart: unless-stopped
    ipc: host
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - ./data/huggingface:/root/.cache/huggingface
    command: >
      ${DENSE_EMBEDDING_MODEL}
      --served-model-name=${DENSE_EMBEDDING_MODEL}
      --api-key=${DENSE_EMBEDDING_TOKEN}
      --runner=pooling
      --convert=embed
      --gpu-memory-utilization=0.20
      --max-model-len=8192
      --max-num-seqs=256
      --enforce-eager
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]

  reranker:
    profiles:
      - reranker
    image: vllm/vllm-openai:latest
    container_name: reranker
    restart: unless-stopped
    ipc: host
    ports:
      - "127.0.0.1:8002:8000"
    volumes:
      - ./data/huggingface:/root/.cache/huggingface
    command: >
      ${RERANKER_MODEL}
      --served-model-name=${RERANKER_MODEL}
      --api-key=${RERANKER_TOKEN}
      --runner=pooling
      --convert=classify
      --gpu-memory-utilization=0.20
      --max-model-len=8192
      --max-num-seqs=256
      --enforce-eager
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]